<div class="mb-4">
  <h2 class="page-title">Library Dashboard</h2>
  <p class="text-muted">
    Manage books, members and transactions from one place.
  </p>
</div>

<div class="row g-4">

  <div class="col-md-3">
    <div class="dashboard-card card-books">
      <h4>Books</h4>
      <p>Manage books, copies and ISBN details.</p>
      <a routerLink="/books" class="btn btn-light btn-sm">
        Open
      </a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="dashboard-card card-members">
      <h4>Members</h4>
      <p>Create and manage library members.</p>
      <a routerLink="/members" class="btn btn-light btn-sm">
        Open
      </a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="dashboard-card card-issue">
      <h4>Issue / Return</h4>
      <p>Issue books and process returns.</p>
      <a routerLink="/issue-return" class="btn btn-dark btn-sm">
        Open
      </a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="dashboard-card card-history">
      <h4>Transactions</h4>
      <p>View full transaction history.</p>
      <a routerLink="/transactions" class="btn btn-light btn-sm">
        Open
      </a>
    </div>
  </div>

</div>
